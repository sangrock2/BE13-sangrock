# 테스트 전용 설정 : 테스트 실행 시에만 적용된다
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: never # data.sql 참조 금지
  file:
    upload-dir: ./build/test-uploads