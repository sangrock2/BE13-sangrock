<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.7.1.js" crossorigin="anonymous"></script>
    <script th:src="@{/js/boardList.js}"></script>
    <link th:href="@{/css/board.css}" rel="stylesheet">
    <title>게시판</title>
</head>
<body>

<div class="container">
    <h1 th:text="|${userName}님 환영합니다.|"></h1>
    <input id="hiddenUserId" type="hidden" th:value="${userId}">
    <input type="hidden" th:value="${userName}">
    <a th:href="@{/write}" class="btn">글쓰기</a>
    <a th:href="@{/members/logout}" class="btn logout-btn logout-btn-position">로그아웃</a>

    <!-- =====================================================================
         검색 폼 영역
         - 여기 입력값들이 GET /api/boards/search 의 쿼리 파라미터(title/userId/from/to)가 된다
         - input 의 id 를 boardList.js 의 getSearchCondition() 이 읽어간다
         - 모든 칸은 "선택"이다: 비워두면 그 조건은 아예 서버로 안 보내고, 서버도 무시한다 (동적 검색)
         ===================================================================== -->
    <div id="searchForm">
        <input id="searchTitle" type="text" placeholder="제목 검색">
        <input id="searchUserId" type="text" placeholder="작성자 아이디">
        <input id="searchFrom" type="date" title="작성일 시작">
        <input id="searchTo" type="date" title="작성일 끝">
        <button id="searchBtn" class="btn" type="button">검색</button>
        <button id="searchResetBtn" class="btn reset-btn" type="button">초기화</button>
    </div>

    <!-- 게시판 영역 -->
    <div id="board">
        <table>
            <thead>
            <tr>
                <th>글 번호</th>
                <th>제목</th>
                <!-- [변경 - QueryDSL] 기존: <th>작성자</th> 한 칸(아이디만 표시)
                     → member 조인으로 가져온 "이름"을 함께 보여주도록 컬럼 구성 변경 -->
                <th>작성자</th>
                <!-- [추가 - QueryDSL] comment 집계로 가져온 댓글 수 컬럼 -->
                <th>댓글</th>
                <th>작성일</th>
            </tr>
            </thead>
            <tbody id="boardContent">
            <!-- Ajax를 통해 게시글 데이터가 여기에 동적으로 추가됨 -->


            </tbody>
        </table>
    </div>

    <!-- 페이징 영역 - 페이지 번호(1,2,3...)는 boardList.js 가 동적으로 채운다 -->
    <div id="pagination"></div>
</div>

</body>
</html>
