spring:
  application:
    name: basic-board
  datasource:
    url: jdbc:mysql://localhost:3306/java_basic?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: programmers
    password: password1234
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  file:
    upload-dir: ./uploads

logging:
  level:
    root: info
    org.example.basicboard: debug
    org.hibernate.sql: debug
    org.hibernate.orm.jdbc.bind: trace

springdoc:
  swagger-ui:
    path: /swagger-ui.html

