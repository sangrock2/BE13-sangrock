<!DOCTYPE html>

<!--
  타임리프(Thymeleaf)
  - 반드시 <html> 태그에 xmlns:th="..." 네임스페이스를 선언해야 th:* 문법을 쓸 수 있다.
  - 타임리프는 'th:' 속성으로 서버의 데이터를 HTML 에 채워 넣는다.
  - th:* 속성이 없는 부분은 그냥 평범한 HTML 이라, 브라우저로 파일을 직접 열어도 깨지지 않는다.
-->

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
</head>

<body>
    <!-- 세션에 username이 있으면 환영 메시지 표시 -->
    <div th:if="${username}">
        <p th:text="${username} + '님 환영합니다!'"></p>
        <a href="/logout">로그아웃</a>
    </div>

    <!-- 세션에 username이 없으면 로그인 폼 표시 -->
    <div th:unless="${username}">
        <form action="/login" method="post">
            <label for="username">사용자 이름:</label>
            <input type="text" id="username" name="username" required />
            <button type="submit">로그인</button>
        </form>
    </div>
</body>
</html>
